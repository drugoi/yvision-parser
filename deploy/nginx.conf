server {
    listen 80;
    server_name myvision.drugoi.xyz;

    client_max_body_size 4m;

    # Single location for the whole app. A separate `location /api/export/`
    # would make nginx 301-redirect the bare POST `/api/export` to a trailing
    # slash, breaking the API — so buffering-off (for streaming the zip) lives
    # here instead.
    location / {
        proxy_pass http://127.0.0.1:8771;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
